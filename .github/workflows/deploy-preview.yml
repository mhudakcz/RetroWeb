name: Náhled na GitHub Pages (noindex)

# Náhledový deploy. HLAVNÍ hosting je jinde (Netlify/Cloudflare) — tento build
# je jen pro náhled, je pod /RetroWeb/ a je vyřazen z indexace (noindex + robots).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Úprava pro náhled (base /RetroWeb, noindex)
        run: |
          # 1) noindex do hlavičky každé stránky
          find dist -name '*.html' -print0 | xargs -0 sed -i 's#<head>#<head><meta name="robots" content="noindex, nofollow">#'
          # 2) prefixuj root-absolutní href/src na /RetroWeb/ (chrání externí i // )
          find dist -name '*.html' -print0 | xargs -0 sed -i -E 's#(href|src)="/([^/])#\1="/RetroWeb/\2#g'
          # 3) robots: zakázat indexaci celého náhledu
          printf 'User-agent: *\nDisallow: /\n' > dist/robots.txt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
